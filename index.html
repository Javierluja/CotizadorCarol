<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:15px}
h2{font-size:20px;font-weight:500}
h3{font-size:16px;font-weight:500}
.app{max-width:960px;margin:0 auto;padding:1rem}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.btn{cursor:pointer;padding:8px 16px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px}
.btn:hover{background:#f0f0f0}
.btn-primary{cursor:pointer;padding:8px 18px;border-radius:8px;border:none;background:#185FA5;color:#fff;font-size:14px;font-weight:500}
.btn-primary:hover{background:#0d4a85}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-danger{border-color:#e57373;color:#c62828}
input,select,textarea{padding:7px 10px;border-radius:8px;border:1px solid #ccc;background:#fafafa;color:#1a1a1a;font-size:14px;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid #185FA5;border-color:#185FA5}
.tabs{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.tab{cursor:pointer;padding:9px 18px;border-radius:8px;border:none;background:#fff;color:#666;font-size:14px;border:1px solid #e0e0e0}
.tab.active{background:#e8f0fe;color:#185FA5;font-weight:500;border-color:#b3c9f5}
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;text-align:left;font-size:12px;color:#666;border-bottom:1px solid #eee;font-weight:500;white-space:nowrap}
td{padding:7px 10px;font-size:13px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:hover td{background:#fafafa}
.badge-ok{display:inline-block;padding:2px 8px;border-radius:99px;font-size:12px;background:#e8f5e9;color:#2e7d32}
.badge-no{display:inline-block;padding:2px 8px;border-radius:99px;font-size:12px;background:#ffebee;color:#c62828}
.badge-wifi{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;background:#fff3e0;color:#e65100}
.total-bar{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px solid #eee;flex-wrap:wrap;gap:12px}
.total-num{font-size:22px;font-weight:500;color:#185FA5}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-map{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.upload-zone{text-align:center;padding:2.5rem;cursor:pointer}
.upload-zone:hover{background:#f0f5ff}
.lbl{font-size:12px;color:#666;margin-bottom:4px;display:block}
.sub{font-size:11px;color:#999}
.ai-offline{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:12px;font-size:13px;color:#795548;margin-bottom:12px}
@media(max-width:600px){.grid2,.grid-map{grid-template-columns:1fr}.app{padding:0.5rem}th,td{padding:5px 6px;font-size:12px}}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const FIELDS = [
  {key:"producto",label:"Producto"},
  {key:"subproducto",label:"Subproducto"},
  {key:"descripcion",label:"Descripción"},
  {key:"laboratorio",label:"Laboratorio"},
  {key:"precio",label:"Precio"},
  {key:"precioLista",label:"Precio Lista"},
  {key:"desc1",label:"Descuento 1"},
  {key:"cantidad",label:"Cantidad"},
  {key:"disponible",label:"Disponible"},
];

let state = {
  step: "upload",
  catalog: [],
  fileName: "",
  sheetNames: [],
  selectedSheet: "",
  workbook: null,
  headers: [],
  columnMap: {},
  mappingReady: false,
  quoteItems: [],
  clientName: "",
  clientRut: "",
  search: "",
  activeTab: "catalog",
  aiInput: "",
  aiImageData: null,
  aiImageName: "",
  loading: false,
  online: navigator.onLine,
};

window.addEventListener("online", () => { state.online = true; render(); });
window.addEventListener("offline", () => { state.online = false; render(); });

const fmt = n => { const x = parseFloat(n); return isNaN(x) ? "-" : x.toLocaleString("es-CL",{minimumFractionDigits:0,maximumFractionDigits:2}); };
const fmtP = n => { const x = parseFloat(n); return (isNaN(x)||x===0) ? "-" : "$"+Math.round(x).toLocaleString("es-CL"); };
const isOk = v => String(v).toLowerCase().includes("si") || String(v).toLowerCase().includes("sí") || Number(v) > 0;

function render() {
  document.getElementById("app").innerHTML = state.step === "upload" ? renderUpload() : renderMain();
  bindEvents();
}

function renderUpload() {
  return `
  <div style="padding-top:1rem">
    <h2 style="margin-bottom:4px">Sistema de cotización</h2>
    <p style="color:#666;font-size:14px;margin-bottom:1.5rem">Carga tu archivo Excel con el catálogo del día</p>
    <div class="card upload-zone" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:40px;margin-bottom:12px">📂</div>
      <p style="color:#666;font-size:14px;margin-bottom:16px">Toca para seleccionar el archivo .xlsx</p>
      <button class="btn-primary" onclick="event.stopPropagation();document.getElementById('fileInput').click()">Seleccionar archivo Excel</button>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    </div>
    ${state.mappingReady ? renderMapping() : ""}
  </div>`;
}

function renderMapping() {
  const sheetOpts = state.sheetNames.map(n => `<option ${n===state.selectedSheet?"selected":""}>${n}</option>`).join("");
  const hdrOpts = `<option value="">— no usar —</option>` + state.headers.map(h => `<option value="${h}">${h}</option>`).join("");
  const mapRows = FIELDS.map(f => `
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:13px;min-width:110px;color:#666">${f.label}:</label>
      <select data-mapkey="${f.key}" style="flex:1">${hdrOpts.replace(`value="${state.columnMap[f.key]||""}"`,`value="${state.columnMap[f.key]||""}" selected`)}</select>
    </div>`).join("");

  return `<div class="card">
    <h3 style="margin-bottom:12px">Configurar columnas — ${state.fileName}</h3>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <label style="font-size:13px;color:#666">Hoja:</label>
      <select id="sheetSel" style="width:auto">${sheetOpts}</select>
      <button class="btn" id="loadSheetBtn">Cargar columnas</button>
    </div>
    ${state.headers.length > 0 ? `<div class="grid-map">${mapRows}</div><button class="btn-primary" id="applyMapBtn">Cargar catálogo →</button>` : ""}
  </div>`;
}

function renderMain() {
  const tabs = [["catalog","Catálogo"],["ai","Pedido IA"],["quote",`Cotización (${state.quoteItems.length})`]];
  const tabsHtml = tabs.map(([k,l]) => `<button class="tab ${state.activeTab===k?"active":""}" data-tab="${k}">${l}</button>`).join("");
  const offlineNote = !state.online ? `<div class="ai-offline">⚠️ Sin conexión — la función de IA no está disponible. El catálogo y cotización funcionan con normalidad.</div>` : "";

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <div>
      <h2 style="margin:0">Sistema de cotización</h2>
      <span style="font-size:12px;color:#666">${state.fileName} · ${state.catalog.length} productos · ${state.online?'<span style="color:#2e7d32">● online</span>':'<span style="color:#c62828">● offline</span>'}</span>
    </div>
    <button class="btn" id="changeFileBtn">Cambiar archivo</button>
  </div>
  ${offlineNote}
  <div class="tabs">${tabsHtml}</div>
  ${state.activeTab==="catalog" ? renderCatalog() : state.activeTab==="ai" ? renderAI() : renderQuote()}`;
}

function renderCatalog() {
  const q = state.search.toLowerCase();
  const filtered = state.catalog.filter(p => !q || [p.producto,p.subproducto,p.descripcion,p.laboratorio].some(v => String(v).toLowerCase().includes(q)));
  const rows = filtered.slice(0,100).map(p => `
    <tr>
      <td><div style="font-weight:500">${p.producto}</div><div class="sub">${p.subproducto}</div></td>
      <td style="max-width:160px;color:#666">${p.descripcion}</td>
      <td>${p.laboratorio}</td>
      <td>${fmtP(p.precio)}</td>
      <td style="color:#999">${fmtP(p.precioLista)}</td>
      <td>${p.desc1||"-"}</td>
      <td>${fmt(p.cantidad)}</td>
      <td><span class="${isOk(p.disponible)?"badge-ok":"badge-no"}">${p.disponible||"-"}</span></td>
      <td><button class="btn-primary btn-add" data-id="${p.id}">+ Agregar</button></td>
    </tr>`).join("");
  return `<div class="card">
    <input id="searchInput" placeholder="Buscar producto, descripción, laboratorio..." value="${state.search}" style="margin-bottom:12px">
    <div style="overflow-x:auto">
      <table>
        <thead><tr>${["Producto","Descripción","Laboratorio","Precio","P.Lista","Desc.","Stock","Disponible",""].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${filtered.length>100?`<p style="font-size:12px;color:#999;margin-top:8px">Mostrando 100 de ${filtered.length}. Refina la búsqueda.</p>`:""}
  </div>`;
}

function renderAI() {
  const offline = !state.online;
  return `<div class="card">
    <h3 style="margin-bottom:4px">Ingresar pedido del cliente</h3>
    <p style="font-size:13px;color:#666;margin-bottom:12px">Pega el mensaje de WhatsApp o sube una foto de la lista o factura.</p>
    ${offline ? `<div class="ai-offline">Sin conexión — función de IA no disponible.</div>` : ""}
    <textarea id="aiText" rows="5" placeholder="Pega aquí el mensaje del cliente... ej: amox 500 x3, ibuprofeno 400 x2..." ${offline?"disabled":""}>${state.aiInput}</textarea>
    <div style="display:flex;gap:10px;align-items:center;margin:10px 0">
      <input type="file" id="aiImgInput" accept="image/*" style="display:none" ${offline?"disabled":""}>
      <button class="btn" id="aiImgBtn" ${offline?"disabled":""}>📷 Subir imagen</button>
      ${state.aiImageName ? `<span style="font-size:12px;color:#666">${state.aiImageName} ✓</span>` : ""}
    </div>
    <button class="btn-primary" id="processAiBtn" ${offline||state.loading?"disabled":""}>${state.loading?"Procesando...":"Procesar pedido con IA →"}</button>
  </div>`;
}

function renderQuote() {
  const rows = state.quoteItems.map(item => {
    const price = item.customPrice !== null && item.customPrice !== "" ? parseFloat(item.customPrice)||0 : parseFloat(item.precio)||0;
    return `<tr>
      <td><div style="font-weight:500">${item.producto}</div><div class="sub">${item.subproducto}</div></td>
      <td style="font-size:12px;color:#666;max-width:140px">${item.descripcion}</td>
      <td style="font-size:12px">${item.laboratorio}</td>
      <td><span class="${isOk(item.disponible)?"badge-ok":"badge-no"}">${item.disponible||"-"}</span></td>
      <td style="font-size:12px">${item.desc1||"-"}</td>
      <td style="color:#999;font-size:12px">${fmtP(item.precioLista)}</td>
      <td><input type="number" class="price-input" data-id="${item.id}" value="${item.customPrice!==null?item.customPrice:item.precio}" style="width:100px"></td>
      <td><input type="number" class="qty-input" data-id="${item.id}" value="${item.qty}" min="1" style="width:65px"></td>
      <td style="font-weight:500">${fmtP(price*item.qty)}</td>
      <td><button class="btn btn-danger rm-btn" data-id="${item.id}">✕</button></td>
    </tr>`;}).join("");
  const total = state.quoteItems.reduce((s,i) => {
    const p = i.customPrice!==null&&i.customPrice!=="" ? parseFloat(i.customPrice)||0 : parseFloat(i.precio)||0;
    return s + p*i.qty;
  },0);
  return `<div>
    <div class="card grid2" style="margin-bottom:0.75rem">
      <div><span class="lbl">Cliente</span><input id="clientName" placeholder="Nombre del cliente" value="${state.clientName}"></div>
      <div><span class="lbl">RUT</span><input id="clientRut" placeholder="RUT" value="${state.clientRut}"></div>
    </div>
    ${state.quoteItems.length===0 ? `<div class="card" style="text-align:center;color:#999;padding:2rem;font-size:14px">Sin productos. Agrega desde el catálogo o usa el ingreso por IA.</div>` : `
    <div class="card">
      <div style="overflow-x:auto">
        <table>
          <thead><tr>${["Producto","Descripción","Lab.","Disponible","Promo","P.Lista","Precio unit.","Cantidad","Total",""].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="total-bar">
        <div class="total-num">Total: $${Math.round(total).toLocaleString("es-CL")}</div>
        <div style="display:flex;gap:10px">
          <button class="btn" id="clearQuoteBtn">Limpiar</button>
          <button class="btn-primary" id="printBtn">Imprimir / PDF</button>
        </div>
      </div>
    </div>`}
  </div>`;
}

function bindEvents() {
  const on = (id, ev, fn) => { const el = document.getElementById(id); if(el) el.addEventListener(ev, fn); };
  const onAll = (sel, ev, fn) => document.querySelectorAll(sel).forEach(el => el.addEventListener(ev, fn));

  on("fileInput","change", e => {
    const file = e.target.files[0]; if(!file) return;
    state.fileName = file.name;
    const reader = new FileReader();
    reader.onload = ev => {
      const wb = XLSX.read(ev.target.result, {type:"array"});
      state.workbook = wb;
      state.sheetNames = wb.SheetNames;
      state.selectedSheet = wb.SheetNames[0];
      state.mappingReady = true;
      state.headers = [];
      state.columnMap = {};
      render();
    };
    reader.readAsArrayBuffer(file);
  });

  on("sheetSel","change", e => { state.selectedSheet = e.target.value; });

  on("loadSheetBtn","click", () => {
    const ws = state.workbook.Sheets[state.selectedSheet];
    const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    if(rows.length<1) return;
    const hdrs = rows[0].map(String);
    state.headers = hdrs;
    const auto = {};
    FIELDS.forEach(f => {
      const kw = f.label.toLowerCase().split(" ")[0];
      const match = hdrs.find(h => h.toLowerCase().includes(kw));
      if(match) auto[f.key] = match;
    });
    state.columnMap = auto;
    render();
    // re-select dropdowns after render
    FIELDS.forEach(f => {
      const el = document.querySelector(`[data-mapkey="${f.key}"]`);
      if(el && auto[f.key]) el.value = auto[f.key];
    });
  });

  document.querySelectorAll("[data-mapkey]").forEach(sel => {
    sel.addEventListener("change", e => { state.columnMap[e.target.dataset.mapkey] = e.target.value; });
  });

  on("applyMapBtn","click", () => {
    const ws = state.workbook.Sheets[state.selectedSheet];
    const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    const hdrs = rows[0].map(String);
    const idx = {};
    Object.entries(state.columnMap).forEach(([k,v]) => { idx[k] = hdrs.indexOf(v); });
    state.catalog = rows.slice(1).filter(r => r[idx.producto]||r[idx.descripcion]).map((r,i) => ({
      id: i,
      producto: idx.producto>=0 ? String(r[idx.producto]||"") : "",
      subproducto: idx.subproducto>=0 ? String(r[idx.subproducto]||"") : "",
      descripcion: idx.descripcion>=0 ? String(r[idx.descripcion]||"") : "",
      laboratorio: idx.laboratorio>=0 ? String(r[idx.laboratorio]||"") : "",
      precio: idx.precio>=0 ? r[idx.precio]||0 : 0,
      precioLista: idx.precioLista>=0 ? r[idx.precioLista]||0 : 0,
      desc1: idx.desc1>=0 ? String(r[idx.desc1]||"") : "",
      cantidad: idx.cantidad>=0 ? r[idx.cantidad]||0 : 0,
      disponible: idx.disponible>=0 ? String(r[idx.disponible]||"") : "",
    }));
    state.step = "catalog";
    state.activeTab = "catalog";
    state.mappingReady = false;
    render();
  });

  on("changeFileBtn","click", () => { state.step="upload"; state.catalog=[]; state.quoteItems=[]; state.workbook=null; state.mappingReady=false; render(); });

  onAll(".tab","click", e => { state.activeTab = e.target.dataset.tab; render(); });

  on("searchInput","input", e => { state.search = e.target.value; render(); });

  onAll(".btn-add","click", e => {
    const id = parseInt(e.target.dataset.id);
    const prod = state.catalog.find(p => p.id===id);
    if(!prod) return;
    const ex = state.quoteItems.find(i => i.id===id);
    if(ex) state.quoteItems = state.quoteItems.map(i => i.id===id ? {...i, qty:i.qty+1} : i);
    else state.quoteItems = [...state.quoteItems, {...prod, qty:1, customPrice:null}];
    const badge = e.target;
    badge.textContent = "✓ Agregado";
    setTimeout(() => { badge.textContent = "+ Agregar"; }, 800);
  });

  on("aiText","input", e => { state.aiInput = e.target.value; });
  on("aiImgBtn","click", () => document.getElementById("aiImgInput").click());
  on("aiImgInput","change", e => {
    const file = e.target.files[0]; if(!file) return;
    state.aiImageName = file.name;
    const reader = new FileReader();
    reader.onload = ev => { state.aiImageData = ev.target.result.split(",")[1]; render(); };
    reader.readAsDataURL(file);
  });

  on("processAiBtn","click", async () => {
    if(!state.aiInput && !state.aiImageData) return;
    state.loading = true; render();
    try {
      const sample = state.catalog.slice(0,300).map(p => `[${p.id}] ${p.producto} ${p.subproducto} ${p.descripcion} | Lab:${p.laboratorio} | Precio:${p.precio}`).join("\n");
      const sys = `Eres un asistente de cotización. Catálogo disponible:\n${sample}\n\nIdentifica qué productos del catálogo coinciden con el pedido del usuario (puede ser texto desordenado, abreviado, o imagen).\nResponde SOLO con JSON array sin markdown:\n[{"id":<id>,"qty":<cantidad>,"nombre":"<nombre>","confianza":"alta|media|baja"}]\nSi no encuentras coincidencia: {"id":-1,"qty":1,"nombre":"<lo que pidió>","confianza":"no encontrado"}`;
      const content = [];
      if(state.aiImageData) content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:state.aiImageData}});
      if(state.aiInput) content.push({type:"text",text:state.aiInput});
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content}]})
      });
      const data = await res.json();
      const raw = data.content?.map(b=>b.text||"").join("")||"";
      const clean = raw.replace(/```json|```/g,"").trim();
      const items = JSON.parse(clean);
      const notFound = [];
      items.forEach(item => {
        if(item.id===-1){notFound.push(item.nombre);return;}
        const prod = state.catalog.find(p=>p.id===item.id);
        if(prod){
          const ex = state.quoteItems.find(i=>i.id===prod.id);
          if(ex) state.quoteItems = state.quoteItems.map(i=>i.id===prod.id?{...i,qty:i.qty+item.qty}:i);
          else state.quoteItems = [...state.quoteItems,{...prod,qty:item.qty,customPrice:null}];
        }
      });
      state.aiInput=""; state.aiImageData=null; state.aiImageName="";
      state.activeTab="quote";
      if(notFound.length) alert("No encontrados en catálogo:\n"+notFound.join("\n"));
    } catch(err) { alert("Error: "+err.message); }
    state.loading=false; render();
  });

  onAll(".qty-input","change", e => {
    const id=parseInt(e.target.dataset.id), n=parseInt(e.target.value);
    if(n<=0) state.quoteItems=state.quoteItems.filter(i=>i.id!==id);
    else state.quoteItems=state.quoteItems.map(i=>i.id===id?{...i,qty:n}:i);
    render();
  });

  onAll(".price-input","change", e => {
    const id=parseInt(e.target.dataset.id);
    state.quoteItems=state.quoteItems.map(i=>i.id===id?{...i,customPrice:e.target.value}:i);
    render();
  });

  onAll(".rm-btn","click", e => {
    const id=parseInt(e.target.dataset.id);
    state.quoteItems=state.quoteItems.filter(i=>i.id!==id);
    render();
  });

  on("clearQuoteBtn","click", () => { if(confirm("¿Limpiar toda la cotización?")){ state.quoteItems=[]; render(); } });

  on("clientName","input", e => { state.clientName=e.target.value; });
  on("clientRut","input", e => { state.clientRut=e.target.value; });

  on("printBtn","click", () => {
    const total = state.quoteItems.reduce((s,i)=>{
      const p=i.customPrice!==null&&i.customPrice!==""?parseFloat(i.customPrice)||0:parseFloat(i.precio)||0;
      return s+p*i.qty;
    },0);
    const rows = state.quoteItems.map(i=>{
      const p=i.customPrice!==null&&i.customPrice!==""?parseFloat(i.customPrice)||0:parseFloat(i.precio)||0;
      return `<tr><td>${i.producto}</td><td>${i.subproducto}</td><td>${i.descripcion}</td><td>${i.laboratorio}</td><td style="text-align:center">${i.qty}</td><td style="text-align:right">${fmtP(p)}</td><td style="text-align:right">${fmtP(p*i.qty)}</td><td style="text-align:center">${i.disponible||"-"}</td><td style="text-align:center">${i.desc1||"-"}</td></tr>`;
    }).join("");
    const win=window.open("","_blank");
    win.document.write(`<!DOCTYPE html><html><head><title>Cotización</title><style>
      body{font-family:Arial,sans-serif;font-size:12px;padding:20px}
      h2{margin:0 0 8px}table{width:100%;border-collapse:collapse;margin-top:16px}
      th{background:#f0f0f0;padding:6px 8px;text-align:left;border:1px solid #ddd}
      td{padding:5px 8px;border:1px solid #ddd}.total{text-align:right;margin-top:12px;font-size:16px;font-weight:bold}
    </style></head><body>
      <h2>Cotización</h2>
      <p><strong>Cliente:</strong> ${state.clientName||"-"} &nbsp; <strong>RUT:</strong> ${state.clientRut||"-"}</p>
      <p><strong>Fecha:</strong> ${new Date().toLocaleDateString("es-CL")} &nbsp; <strong>Archivo:</strong> ${state.fileName}</p>
      <table><thead><tr><th>Producto</th><th>Subproducto</th><th>Descripción</th><th>Lab.</th><th>Cant.</th><th>Precio</th><th>Total</th><th>Disponible</th><th>Promo</th></tr></thead><tbody>${rows}</tbody></table>
      <div class="total">Total: $${Math.round(total).toLocaleString("es-CL")}</div>
    </body></html>`);
    win.document.close(); win.print();
  });
}

render();
</script>
</body>
